<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Expense Tracker Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">
  <div class="row vh-100">

    <!-- Sidebar -->
    <div class="col-lg-2 border-end bg-white d-flex flex-column justify-content-between p-0">

      <div>

        <!-- Logo -->
        <div class="p-4 border-bottom">
          <h3 class="fw-bold text-primary">
            <i class="bi bi-stars"></i> Expense
          </h3>
        </div>

        <!-- Menu -->
        <div class="p-3 sidebar-menu">

          <a href="dashboard.html" class="btn w-100 text-start py-3 mb-3">
            <i class="bi bi-grid me-2"></i>
            Dashboard
          </a>

          <a href="budgets.html" class="btn w-100 text-start py-3 mb-2">
            <i class="bi bi-wallet2 me-2"></i>
            Budgets
          </a>

          <a href="expenses.html" class="btn w-100 text-start py-3 mb-2">
            <i class="bi bi-receipt me-2"></i>
            Expenses
          </a>

          <a href="upgrade.html" class="btn w-100 text-start py-3">
            <i class="bi bi-shield-check me-2"></i>
            Upgrade
          </a>

        </div>

      </div>

      <!-- Profile -->
      <div class="p-4 border-top">

        <button class="btn d-flex align-items-center">

          <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center me-3"
               style="width:45px;height:45px;">
            D
          </div>

          <span class="fw-semibold">
            Profile
          </span>

        </button>

      </div>

    </div>

    <!-- Main Content -->
    <div class="col-lg-10 bg-light p-0">

      <!-- Top Navbar -->
      <div class="d-flex justify-content-end align-items-center border-bottom bg-white p-4">

        <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center"
             style="width:45px;height:45px;">
          D
        </div>

      </div>

      <!-- Content -->
      <div class="p-5">

        <!-- Heading -->
        <h1 class="fw-bold display-5">
          Hi, Game Play ✌
        </h1>

        <p class="text-secondary fs-5 mb-5">
          Here's what happening with your money, Lets Manage your expense
        </p>

        <!-- Cards -->
        <div class="row g-4 mb-5">

          <!-- Card 1 -->
          <div class="col-lg-4">

            <div class="card border-0 shadow-sm rounded-4 p-4">

              <div class="d-flex justify-content-between align-items-center">

                <div>
                  <h5 class="text-secondary">
                    Total Budget
                  </h5>

                  <h1 class="fw-bold" id="totalBudgetVal">
                    $15100
                  </h1>
                </div>

                <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
                     style="width:60px;height:60px;">
                  <i class="bi bi-wallet2 fs-3"></i>
                </div>

              </div>

            </div>

          </div>

          <!-- Card 2 -->
          <div class="col-lg-4">

            <div class="card border-0 shadow-sm rounded-4 p-4">

              <div class="d-flex justify-content-between align-items-center">

                <div>
                  <h5 class="text-secondary">
                    Total Spend
                  </h5>

                  <h1 class="fw-bold" id="totalSpendVal">
                    $4830
                  </h1>
                </div>

                <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
                     style="width:60px;height:60px;">
                  <i class="bi bi-clipboard-data fs-3"></i>
                </div>

              </div>

            </div>

          </div>

          <!-- Card 3 -->
          <div class="col-lg-4">

            <div class="card border-0 shadow-sm rounded-4 p-4">

              <div class="d-flex justify-content-between align-items-center">

                <div>
                  <h5 class="text-secondary">
                    No. Of Budget
                  </h5>

                  <h1 class="fw-bold" id="budgetCountVal">
                    5
                  </h1>
                </div>

                <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
                     style="width:60px;height:60px;">
                  <i class="bi bi-wallet fs-3"></i>
                </div>

              </div>

            </div>

          </div>

        </div>

        <!-- Bottom Section -->
        <div class="row g-4">

          <!-- Chart -->
          <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4 p-4">

              <h2 class="fw-bold mb-4">
                Activity
              </h2>

              <div class="d-flex justify-content-around align-items-end" id="chartContainer"
                   style="height:350px;">
                <!-- Dynamically Rendered Bars -->
              </div>

            </div>

          </div>

          <!-- Latest Budgets -->
          <div class="col-lg-4">

            <h2 class="fw-bold mb-4">
              Latest Budgets
            </h2>

            <div id="latestBudgetsContainer">
              <!-- Dynamically Rendered Budget Cards -->
            </div>

          </div>

        <!-- Bottom Section -->
        <div class="row g-4 mt-1">

        <!-- Latest Expenses -->
        <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4 p-4">

            <h2 class="fw-bold mb-4">
                Latest Expenses
            </h2>

            <div class="table-responsive">

                <table class="table align-middle">

                <thead class="table-light">

                    <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                    </tr>

                </thead>

                <tbody id="latestExpensesTable">
                  <!-- Dynamically Rendered Expenses -->
                </tbody>

                </table>

            </div>

            </div>

        </div>

        <!-- Right Side Cards -->
        <div class="col-lg-4" id="rightBudgetsContainer">
          <!-- Dynamically Rendered Budget Cards -->
        </div>

      </div>

      </div>
      
      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const budgets = DB.getBudgets();
  const expenses = DB.getExpenses();

  // 1. Calculate Stats
  let totalBudget = 0;
  let totalSpend = 0;
  
  const spentMap = {};
  budgets.forEach(b => {
    totalBudget += Number(b.amount);
    spentMap[b.id] = 0;
  });

  const expenseCounts = {};
  expenses.forEach(e => {
    totalSpend += Number(e.amount);
    if (spentMap[e.budgetId] !== undefined) {
      spentMap[e.budgetId] += Number(e.amount);
    }
    expenseCounts[e.budgetId] = (expenseCounts[e.budgetId] || 0) + 1;
  });

  document.getElementById('totalBudgetVal').textContent = '$' + totalBudget;
  document.getElementById('totalSpendVal').textContent = '$' + totalSpend;
  document.getElementById('budgetCountVal').textContent = budgets.length;

  // 2. Render Activity Chart
  const chartContainer = document.getElementById('chartContainer');
  chartContainer.innerHTML = '';
  
  if (budgets.length === 0) {
    chartContainer.innerHTML = '<p class="text-secondary text-center w-100 py-5">No budget data available.</p>';
  } else {
    let maxVal = 0;
    budgets.forEach(b => {
      const spent = spentMap[b.id] || 0;
      if (spent > maxVal) maxVal = spent;
      if (Number(b.amount) > maxVal) maxVal = Number(b.amount);
    });
    if (maxVal === 0) maxVal = 100;

    budgets.forEach(b => {
      const spent = spentMap[b.id] || 0;
      const budgetAmount = Number(b.amount);
      const spentPercent = Math.min((spent / budgetAmount) * 100, 100);
      const heightPx = Math.max((spent / maxVal) * 280, 15);

      const col = document.createElement('div');
      col.className = 'chart-bar-container';
      
      const tooltip = `$${spent} of $${budgetAmount}`;
      
      let barStyle = 'background: linear-gradient(180deg, var(--primary-color) 0%, #818cf8 100%);';
      if (spentPercent >= 100) {
        barStyle = 'background: linear-gradient(180deg, #ef4444 0%, #f87171 100%);';
      } else if (spentPercent > 75) {
        barStyle = 'background: linear-gradient(180deg, #f59e0b 0%, #fbbf24 100%);';
      }
      
      col.innerHTML = `
        <div class="chart-bar w-100" 
             style="height:${heightPx}px; ${barStyle}" 
             data-tooltip="${tooltip}"></div>
        <p class="mt-2 fw-semibold text-truncate w-100 text-center" style="font-size:12px;">${b.name}</p>
      `;
      chartContainer.appendChild(col);
    });
  }

  // Helper to create a budget card element (using pure Bootstrap)
  function createBudgetCardHTML(b) {
    const spent = spentMap[b.id] || 0;
    const amount = Number(b.amount);
    const remaining = amount - spent;
    const percent = Math.min((spent / amount) * 100, 100);
    const itemsCount = expenseCounts[b.id] || 0;
    const isOver = spent > amount;

    return `
      <div class="card border-0 shadow-sm rounded-4 p-4 mb-4" style="cursor:pointer;" onclick="location.href='expenses.html?budgetId=${b.id}'">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-light rounded-circle d-flex justify-content-center align-items-center me-3" style="width:55px;height:55px;font-size:24px;">
              ${b.emoji || '💰'}
            </div>
            <div>
              <h4 class="fw-bold mb-0">${b.name}</h4>
              <small class="text-secondary">${itemsCount} Item${itemsCount !== 1 ? 's' : ''}</small>
            </div>
          </div>
          <h2 class="text-primary fw-bold mb-0">$${amount}</h2>
        </div>
        <div class="d-flex justify-content-between">
          <small class="${isOver ? 'text-danger fw-bold' : 'text-secondary'}">$${spent} Spend</small>
          <small class="${remaining < 0 ? 'text-danger fw-bold' : 'text-secondary'}">$${Math.abs(remaining)} ${remaining < 0 ? 'Over' : 'Remaining'}</small>
        </div>
        <div class="progress mt-2" style="height:8px;">
          <div class="progress-bar ${isOver ? 'bg-danger' : ''}" style="width: ${percent}%;"></div>
        </div>
      </div>
    `;
  }

  // 3. Render Latest Budgets (first 2)
  const latestBudgetsContainer = document.getElementById('latestBudgetsContainer');
  latestBudgetsContainer.innerHTML = '';
  const firstTwoBudgets = budgets.slice(0, 2);
  firstTwoBudgets.forEach(b => {
    latestBudgetsContainer.innerHTML += createBudgetCardHTML(b);
  });
  if (firstTwoBudgets.length === 0) {
    latestBudgetsContainer.innerHTML = '<div class="alert alert-light text-center rounded-4">No budgets created yet.</div>';
  }

  // 4. Render Right Side Budgets (remaining budgets)
  const rightBudgetsContainer = document.getElementById('rightBudgetsContainer');
  rightBudgetsContainer.innerHTML = '';
  const remainingBudgets = budgets.slice(2);
  remainingBudgets.forEach(b => {
    rightBudgetsContainer.innerHTML += createBudgetCardHTML(b);
  });

  // 5. Render Latest Expenses
  const latestExpensesTable = document.getElementById('latestExpensesTable');
  latestExpensesTable.innerHTML = '';

  const latestExpenses = [...expenses].reverse().slice(0, 10);
  
  if (latestExpenses.length === 0) {
    latestExpensesTable.innerHTML = `
      <tr>
        <td colspan="4" class="text-center text-secondary py-4">No expenses recorded yet.</td>
      </tr>
    `;
  } else {
    latestExpenses.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.name}</td>
        <td>$${e.amount}</td>
        <td>${e.date}</td>
        <td>
          <button class="btn btn-outline-danger btn-sm delete-btn" data-id="${e.id}">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      `;
      
      tr.querySelector('.delete-btn').addEventListener('click', function(evt) {
        evt.stopPropagation();
        if (confirm(`Are you sure you want to delete the expense "${e.name}"?`)) {
          DB.deleteExpense(e.id);
          location.reload();
        }
      });
      
      latestExpensesTable.appendChild(tr);
    });
  }
});
</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
