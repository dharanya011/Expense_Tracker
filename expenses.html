<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expenses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container-fluid">
  <div class="row vh-100">

    <!-- Sidebar -->
    <div class="col-lg-2 border-end bg-white d-flex flex-column justify-content-between p-0">

      <div>

        <!-- Logo -->
        <div class="p-4 border-bottom">
          <h3 class="fw-bold text-primary">
            <i class="bi bi-stars"></i> Expense
          </h3>
        </div>

        <!-- Menu -->
        <div class="p-3 sidebar-menu">

          <a href="dashboard.html"
             class="btn w-100 text-start py-3 mb-3">
            <i class="bi bi-grid me-2"></i>
            Dashboard
          </a>

          <a href="budgets.html"
             class="btn w-100 text-start py-3 mb-2">
            <i class="bi bi-wallet2 me-2"></i>
            Budgets
          </a>

          <a href="expenses.html"
             class="btn w-100 text-start py-3 mb-2">
            <i class="bi bi-receipt me-2"></i>
            Expenses
          </a>

          <a href="upgrade.html"
             class="btn w-100 text-start py-3">
            <i class="bi bi-shield-check me-2"></i>
            Upgrade
          </a>

        </div>

      </div>

      <!-- Profile -->
      <div class="p-4 border-top">

        <button class="btn d-flex align-items-center">

          <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center me-3"
               style="width:45px;height:45px;">
            D
          </div>

          <span class="fw-semibold">
            Profile
          </span>

        </button>

      </div>

    </div>

    <!-- Main Content -->
    <div class="col-lg-10 p-0">

      <!-- Top Navbar -->
      <div class="d-flex justify-content-end align-items-center border-bottom bg-white p-4">

        <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center"
             style="width:45px;height:45px;">
          D
        </div>

      </div>

      <!-- Page Content -->
      <div class="p-5">
        
        <div class="d-flex justify-content-between align-items-center">

          <h1 class="fw-bold mb-3 d-flex align-items-center">

          <a href="budgets.html"
            class="text-dark me-3">
            <i class="bi bi-arrow-left mb-2 p-2"></i>
          </a>

          My Expenses

          </h1>
          <div class="ms-auto">
            <button id="updateBtn" class="btn btn-primary mb-2 p-2"><i class="bi bi-pencil-square"></i> Edit</button>
            <button  id="deleteBtn" class="btn btn-danger mb-2 p-2"><i class="bi bi-trash-fill"></i> Delete</button>
          </div>
        </div>

        <!-- Top Cards -->
        <div class="row g-4">

          <!-- Budget Card -->
          <div class="col-lg-6">

            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">

              <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="d-flex align-items-center">

                  <div class="bg-light rounded-circle d-flex justify-content-center align-items-center me-3"
                       style="width:60px;height:60px;font-size:25px;" id="budgetEmojiVal">
                    🚗
                  </div>

                  <div>

                    <h4 class="fw-bold mb-0" id="budgetNameVal">
                      Car Maintenance
                    </h4>

                    <small class="text-secondary" id="budgetItemsCountVal">
                      2 Items
                    </small>

                  </div>

                </div>

                <h2 class="text-primary fw-bold mb-0" id="budgetAmountVal">
                  $1500
                </h2>

              </div>

              <div class="d-flex justify-content-between">

                <small id="budgetSpendText" class="text-secondary">$0 Spend</small>

                <small id="budgetRemainingText" class="text-secondary">$0 Remaining</small>

              </div>

              <div class="progress mt-2" style="height:8px;">

                <div class="progress-bar" id="budgetProgressBar" style="width: 0%;"></div>

              </div>

            </div>

          </div>

          <!-- Add Expense Form -->
          <div class="col-lg-6">

            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">

              <h3 class="fw-bold mb-4">
                Add Expense
              </h3>

              <form id="expenseForm">

                <div class="mb-4">

                  <label class="form-label fw-semibold">
                    Expense Name
                  </label>

                  <input
                    type="text"
                    id="expenseName"
                    class="form-control form-control-lg"
                    placeholder="e.g. Bedroom Decor"
                    required
                  >

                </div>

                <div class="mb-4">

                  <label class="form-label fw-semibold">
                    Expense Amount
                  </label>

                  <input
                    type="number"
                    id="expenseAmount"
                    class="form-control form-control-lg"
                    placeholder="e.g. 1000"
                    required
                  >

                </div>

                <button class="btn btn-primary w-100 py-3 fw-semibold">
                  Add New Expense
                </button>

              </form>

            </div>

          </div>

        </div>

        <!-- Expense Table -->
        <div class="mt-5">

          <h2 class="fw-bold mb-4">
            Latest Expenses
          </h2>

          <div class="table-responsive">

            <table class="table table-bordered bg-white">

              <thead class="table-secondary">

                <tr>
                  <th>Name</th>
                  <th>Amount</th>
                  <th>Date</th>
                  <th>Action</th>
                </tr>

              </thead>

              <tbody id="expenseTable">
                <!-- Dynamically Rendered Expenses -->
              </tbody>

            </table>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>

<!-- Edit Budget Modal -->
<div class="modal fade" id="editBudgetModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header border-0">
        <h3 class="fw-bold">Edit Budget</h3>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="editBudgetForm">
          <div class="mb-4">
            <label class="form-label fw-semibold">Budget Name</label>
            <input type="text" id="editBudgetName" class="form-control form-control-lg" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Budget Amount</label>
            <input type="number" id="editBudgetAmount" class="form-control form-control-lg" required>
          </div>
          <button class="btn btn-primary w-100 py-3 fw-semibold">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

<!-- JS -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const budgets = DB.getBudgets();
  let budgetId = new URLSearchParams(window.location.search).get('budgetId');

  if (!budgetId) {
    if (budgets.length > 0) {
      budgetId = budgets[0].id;
      const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?budgetId=' + budgetId;
      window.history.pushState({path:newUrl}, '', newUrl);
    } else {
      alert('Please create a budget first!');
      window.location.href = 'budgets.html';
      return;
    }
  }

  const budget = budgets.find(b => b.id === budgetId);
  if (!budget) {
    alert('Selected budget not found!');
    window.location.href = 'budgets.html';
    return;
  }

  renderBudgetDetails(budget);
  renderExpenses(budgetId);

  // Bind Delete Budget button
  document.getElementById('deleteBtn').addEventListener('click', () => {
    if (confirm(`Are you sure you want to delete the budget "${budget.name}"? This will also delete all its expenses.`)) {
      DB.deleteBudget(budget.id);
      window.location.href = 'budgets.html';
    }
  });

  // Bind Edit Budget Modal setup
  const editModalEl = document.getElementById('editBudgetModal');
  const editModal = new bootstrap.Modal(editModalEl);
  
  document.getElementById('updateBtn').addEventListener('click', () => {
    document.getElementById('editBudgetName').value = budget.name;
    document.getElementById('editBudgetAmount').value = budget.amount;
    editModal.show();
  });

  // Bind Edit Budget Form submit
  document.getElementById('editBudgetForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const updatedName = document.getElementById('editBudgetName').value.trim();
    const updatedAmount = parseFloat(document.getElementById('editBudgetAmount').value);

    if (updatedName && !isNaN(updatedAmount)) {
      budget.name = updatedName;
      budget.amount = updatedAmount;
      DB.updateBudget(budget);
      editModal.hide();
      renderBudgetDetails(budget);
    }
  });

  // Bind Expense Form submit
  const expenseForm = document.getElementById('expenseForm');
  expenseForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const expName = document.getElementById('expenseName').value.trim();
    const expAmount = parseFloat(document.getElementById('expenseAmount').value);

    if (expName && !isNaN(expAmount)) {
      const today = new Date();
      const expDate = today.getDate().toString().padStart(2, '0') + '/' +
                      (today.getMonth() + 1).toString().padStart(2, '0') + '/' +
                      today.getFullYear();

      const newExpense = {
        id: 'e_' + Date.now(),
        budgetId: budgetId,
        name: expName,
        amount: expAmount,
        date: expDate,
        createdAt: today.toISOString()
      };

      DB.addExpense(newExpense);
      expenseForm.reset();
      
      renderBudgetDetails(budget);
      renderExpenses(budgetId);
    }
  });
});

function renderBudgetDetails(budget) {
  const expenses = DB.getExpenses().filter(e => e.budgetId === budget.id);
  const spent = expenses.reduce((sum, e) => sum + Number(e.amount), 0);
  const amount = Number(budget.amount);
  const remaining = amount - spent;
  const percent = Math.min((spent / amount) * 100, 100);
  const count = expenses.length;
  const isOver = spent > amount;

  document.getElementById('budgetEmojiVal').textContent = budget.emoji || '💰';
  document.getElementById('budgetNameVal').textContent = budget.name;
  document.getElementById('budgetItemsCountVal').textContent = `${count} Item${count !== 1 ? 's' : ''}`;
  document.getElementById('budgetAmountVal').textContent = `$${amount}`;
  
  const spendEl = document.getElementById('budgetSpendText');
  spendEl.textContent = `$${spent} Spend`;
  if (isOver) {
    spendEl.className = 'text-danger fw-bold';
  } else {
    spendEl.className = 'text-secondary';
  }

  const remainingEl = document.getElementById('budgetRemainingText');
  remainingEl.textContent = `$${Math.abs(remaining)} ${remaining < 0 ? 'Over' : 'Remaining'}`;
  if (remaining < 0) {
    remainingEl.className = 'text-danger fw-bold';
  } else {
    remainingEl.className = 'text-secondary';
  }

  const progressEl = document.getElementById('budgetProgressBar');
  progressEl.style.width = percent + '%';
  if (isOver) {
    progressEl.className = 'progress-bar bg-danger';
  } else {
    progressEl.className = 'progress-bar';
  }
}

function renderExpenses(budgetId) {
  const expenses = DB.getExpenses().filter(e => e.budgetId === budgetId);
  const expenseTable = document.getElementById('expenseTable');
  expenseTable.innerHTML = '';

  if (expenses.length === 0) {
    expenseTable.innerHTML = `
      <tr>
        <td colspan="4" class="text-center text-secondary py-4">No expenses recorded for this budget yet.</td>
      </tr>
    `;
  } else {
    [...expenses].reverse().forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.name}</td>
        <td>$${e.amount}</td>
        <td>${e.date}</td>
        <td>
          <button class="btn text-danger delete-btn" data-id="${e.id}">
            <i class="bi bi-trash fs-4"></i>
          </button>
        </td>
      `;

      tr.querySelector('.delete-btn').addEventListener('click', () => {
        if (confirm(`Are you sure you want to delete the expense "${e.name}"?`)) {
          DB.deleteExpense(e.id);
          const budgets = DB.getBudgets();
          const budget = budgets.find(b => b.id === budgetId);
          renderBudgetDetails(budget);
          renderExpenses(budgetId);
        }
      });

      expenseTable.appendChild(tr);
    });
  }
}
</script>

</body>
</html>
